<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Repeated Maze Visualizer</title>
<style>
body { font-family: sans-serif; margin: 20px; background: #f5f5f5; }
h1 { font-size: 20px; margin: 0 0 12px; }
.fields { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; }
.field label { font-weight: bold; margin-bottom: 3px; font-size: 14px; }
textarea { font-family: monospace; font-size: 13px; padding: 6px; border: 1px solid #aaa; border-radius: 3px; }
#maze-input { width: 640px; height: 50px; }
#answer-input { width: 640px; height: 50px; }
button { padding: 7px 22px; font-size: 14px; cursor: pointer; background: #3498db; color: #fff; border: none; border-radius: 4px; }
button:hover { background: #2980b9; }
.legend { margin-top: 8px; font-size: 12px; color: #555; }
.legend span { margin-right: 14px; }
.legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }
.canvas-wrap { border: 1px solid #ccc; background: #fff; margin-top: 10px; max-width: 100%; }
canvas { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<h1>Repeated Maze Visualizer</h1>
<div class="fields">
  <div class="field">
    <label for="maze-input">Maze:</label>
    <textarea id="maze-input">normal: W0-N0, S0-W2, W2-S1, N1-W1; nx: (none); ny: (none)</textarea>
  </div>
  <div class="field">
    <label for="answer-input">Answer:</label>
    <textarea id="answer-input">(0,1,E0) -> (1,1,N0) -> (0,2,E2) -> (1,1,N1) -> (0,1,E1)</textarea>
  </div>
</div>
<div style="margin-bottom: 8px;">
  <label><input type="checkbox" id="chk-normal" checked> normal</label>
  <label style="margin-left: 12px;"><input type="checkbox" id="chk-simple"> x,y only</label>
  <label style="margin-left: 12px;"><input type="checkbox" id="chk-directed"> directed</label>
</div>
<button id="draw-btn">Draw Maze</button>
<div id="normal-section">
  <div class="legend">
    <span><span class="swatch" style="background:#e63946"></span>Path</span>
    <span><span class="swatch" style="background:#27ae60"></span>Start</span>
    <span><span class="swatch" style="background:#c0392b"></span>Goal</span>
  </div>
  <div id="canvas-wrap" class="canvas-wrap"><canvas id="canvas"></canvas></div>
</div>
<div id="simple-section" style="display:none;">
  <div class="legend">
    <span><span class="swatch" style="background:#0000ff"></span>Start</span>
    <span><span class="swatch" style="background:#ff0000"></span>End</span>
    <span>Color: Blue → Red</span>
  </div>
  <div id="canvas-wrap-simple" class="canvas-wrap"><canvas id="canvas-simple"></canvas></div>
</div>

<script>
/* Base sizes (at scale=1, these correspond to the "2x" design) */
const BASE_CELL = 240;
const BASE_MARGIN = 100;

/* ---- Parsing ---- */

function parseTermName(s) {
  s = s.trim();
  return { dir: s[0], idx: parseInt(s.substring(1)) };
}

function parseMaze(text) {
  /* Strip "Maze:" prefix and any "Path length: N" lines */
  text = text.replace(/^maze:\s*/i, '').trim();
  text = text.replace(/^path\s+length:\s*\d+.*$/gim, '').trim();
  const result = { normal: [], nx: [], ny: [] };
  const sections = text.split(';');
  for (const sec of sections) {
    const t = sec.trim();
    const ci = t.indexOf(':');
    if (ci < 0) continue;
    const type = t.substring(0, ci).trim().toLowerCase();
    const body = t.substring(ci + 1).trim();
    if (body === '(none)' || !body) continue;
    const ports = body.split(',').map(p => {
      const t = p.trim();
      const parts = t.includes('->') ? t.split('->') : t.split('-');
      if (parts.length !== 2) return null;
      return { src: parseTermName(parts[0]), dst: parseTermName(parts[1]) };
    }).filter(p => p !== null);
    if (type === 'normal') result.normal = ports;
    else if (type === 'nx') result.nx = ports;
    else if (type === 'ny') result.ny = ports;
  }
  return result;
}

function parsePath(text) {
  /* Strip "Path:" prefix and "Path length: N" lines */
  text = text.replace(/^path\s+length:\s*\d+.*$/gim, '').trim();
  text = text.replace(/^path:\s*/i, '').trim();
  if (!text) return [];
  const parts = text.split('->');
  return parts.map(p => {
    const m = p.trim().match(/\((-?\d+),(-?\d+),([A-Z])(\d+)\)/);
    if (!m) return null;
    return { x: parseInt(m[1]), y: parseInt(m[2]), dir: m[3], idx: parseInt(m[4]) };
  }).filter(s => s !== null);
}

function detectNterm(maze, path) {
  let nterm = 2;
  for (const ports of [maze.normal, maze.nx, maze.ny])
    for (const p of ports)
      nterm = Math.max(nterm, p.src.idx + 1, p.dst.idx + 1);
  for (const s of path)
    nterm = Math.max(nterm, s.idx + 1);
  return nterm;
}

/* ---- Geometry helpers ---- */

function termLocalPos(dir, idx, nterm, cellSize) {
  const t = cellSize * (idx + 1) / (nterm + 1);
  switch (dir) {
    case 'E': return { x: cellSize, y: t };
    case 'W': return { x: 0, y: t };
    case 'N': return { x: t, y: 0 };
    case 'S': return { x: t, y: cellSize };
  }
}

function termInsetPos(dir, idx, nterm) {
  const p = termLocalPos(dir, idx, nterm);
  switch (dir) {
    case 'E': return { x: p.x - INSET, y: p.y };
    case 'W': return { x: p.x + INSET, y: p.y };
    case 'N': return { x: p.x, y: p.y + INSET };
    case 'S': return { x: p.x, y: p.y - INSET };
  }
}

/* ---- Orthogonal port routing ---- */

/*
 * routeBlockPorts -- compute orthogonal polyline routes for all normal ports.
 *
 * Algorithm (from diagonal.md):
 * 1. Count ports per side. p_WE = max(p_W,p_E), p_SN = max(p_S,p_N).
 * 2. Create sub-block grid: (p_SN+2) rows × (p_WE+2) columns.
 *    Row 0 = S border, row p_SN+1 = N border.
 *    Col 0 = W border, col p_WE+1 = E border.
 * 3. Assign each port-end a channel (row for W/E, col for N/S).
 * 4. Build sub-terminals (branching spines) for terminals with multiple ports.
 * 5. Route: adjacent sides → L-bend, opposite sides → Z-bend, same side → U-bend.
 * 6. Collision avoidance: insert rows/columns when non-crossing overlaps occur.
 *
 * Returns array of polylines (each is [{x,y}] in block-local coordinates).
 */
function routeBlockPorts(ports, nterm, cellSize) {
  if (ports.length === 0) return { routes: [], spines: [] };

  const opposite = { E: 'W', W: 'E', N: 'S', S: 'N' };
  const isLR = d => d === 'W' || d === 'E';

  /* Step 1: Count ports per terminal and per side */
  const termPorts = {};
  for (let i = 0; i < ports.length; i++) {
    const p = ports[i];
    const sk = p.src.dir + p.src.idx, dk = p.dst.dir + p.dst.idx;
    (termPorts[sk] = termPorts[sk] || []).push({ pi: i, end: 'src' });
    (termPorts[dk] = termPorts[dk] || []).push({ pi: i, end: 'dst' });
  }

  /* Assign channel indices per side */
  const sideCh = { W: 0, E: 0, N: 0, S: 0 };
  const chMap = [];
  for (let i = 0; i < ports.length; i++) chMap.push({ src: -1, dst: -1 });
  for (let d = 0; d < 4; d++) {
    const dir = 'WENS'[d];
    for (let idx = 0; idx < nterm; idx++) {
      const k = dir + idx;
      if (!termPorts[k]) continue;
      for (const { pi, end } of termPorts[k])
        chMap[pi][end] = sideCh[dir]++;
    }
  }
  const pW = sideCh.W, pE = sideCh.E, pN = sideCh.N, pS = sideCh.S;

  /* Step 2: Grid-based routing with post-hoc row/column insertion.
   *
   * Grid cells: grid[r][c] = bitflags (1=H segment, 2=V segment).
   * H+V in same cell = crossing (OK).
   * Two H or two V in same cell = collision → insert row or column.
   *
   * W and E get SEPARATE rows (no sharing) to prevent H conflicts.
   * N and S get SEPARATE columns (no sharing).
   *
   * Rows: 0=N-border, 1..pW=W channels, pW+1..pW+pE=E channels, pW+pE+1=S-border
   * Cols: 0=W-border, 1..pN=N channels, pN+1..pN+pS=S channels, pN+pS+1=E-border
   */
  const H = 1, V = 2;
  let nR = pW + pE + 2, nC = pN + pS + 2;
  if (nR < 3) nR = 3;
  if (nC < 3) nC = 3;

  let grid = Array.from({length: nR}, () => Array(nC).fill(0));

  /* Channel grid positions (mutable on insert) */
  function mkChG(dir, ch) {
    switch (dir) {
      case 'W': return { r: ch + 1, c: 0 };
      case 'E': return { r: pW + ch + 1, c: nC - 1 };
      case 'N': return { r: 0, c: ch + 1 };
      case 'S': return { r: nR - 1, c: pN + ch + 1 };
    }
  }
  const chG = [];
  for (let i = 0; i < ports.length; i++)
    chG.push({ src: mkChG(ports[i].src.dir, chMap[i].src),
               dst: mkChG(ports[i].dst.dir, chMap[i].dst) });

  /* All route paths as grid coords */
  const allRoutes = [];

  function insertRow(atR) {
    grid.splice(atR, 0, Array(nC).fill(0));
    nR++;
    for (const cg of chG) {
      if (cg.src.r >= atR) cg.src.r++;
      if (cg.dst.r >= atR) cg.dst.r++;
    }
    for (const rt of allRoutes)
      for (const pt of rt)
        if (pt.r >= atR) pt.r++;
  }

  function insertCol(atC) {
    for (const row of grid) row.splice(atC, 0, 0);
    nC++;
    for (const cg of chG) {
      if (cg.src.c >= atC) cg.src.c++;
      if (cg.dst.c >= atC) cg.dst.c++;
    }
    for (const rt of allRoutes)
      for (const pt of rt)
        if (pt.c >= atC) pt.c++;
  }

  /* Check if an H→V→H route is collision-free.
   * Skip source cell (sg) and destination cell (dg) — they are sub-terminal
   * cells where multiple routes naturally share the same cell. */
  function isHVHFree(sg, dg, mc) {
    /* H1: sg.r from sg.c to mc (skip sg.c) */
    const c1lo = Math.min(sg.c, mc), c1hi = Math.max(sg.c, mc);
    for (let c = c1lo; c <= c1hi; c++)
      if (c !== sg.c && grid[sg.r][c] & H) return false;
    /* V: sg.r to dg.r at mc */
    const rlo = Math.min(sg.r, dg.r), rhi = Math.max(sg.r, dg.r);
    for (let r = rlo; r <= rhi; r++)
      if (grid[r][mc] & V) return false;
    /* H2: dg.r from mc to dg.c (skip dg.c) */
    const c2lo = Math.min(mc, dg.c), c2hi = Math.max(mc, dg.c);
    for (let c = c2lo; c <= c2hi; c++)
      if (c !== dg.c && grid[dg.r][c] & H) return false;
    return true;
  }

  /* Check if a V→H→V route is collision-free.
   * Skip source cell (sg) and destination cell (dg). */
  function isVHVFree(sg, dg, mr) {
    /* V1: sg.r to mr at sg.c (skip sg.r) */
    const r1lo = Math.min(sg.r, mr), r1hi = Math.max(sg.r, mr);
    for (let r = r1lo; r <= r1hi; r++)
      if (r !== sg.r && grid[r][sg.c] & V) return false;
    /* H: mr from sg.c to dg.c */
    const clo = Math.min(sg.c, dg.c), chi = Math.max(sg.c, dg.c);
    for (let c = clo; c <= chi; c++)
      if (grid[mr][c] & H) return false;
    /* V2: mr to dg.r at dg.c (skip dg.r) */
    const r2lo = Math.min(mr, dg.r), r2hi = Math.max(mr, dg.r);
    for (let r = r2lo; r <= r2hi; r++)
      if (r !== dg.r && grid[r][dg.c] & V) return false;
    return true;
  }

  /* Find a free column for H→V→H route, checking all 3 segments */
  function findFreeCol(sg, dg) {
    for (let c = 1; c < nC - 1; c++)
      if (isHVHFree(sg, dg, c)) return c;
    const nc = nC - 1;
    insertCol(nc);
    return nc;
  }

  /* Find a free row for V→H→V route, checking all 3 segments */
  function findFreeRow(sg, dg) {
    for (let r = 1; r < nR - 1; r++)
      if (isVHVFree(sg, dg, r)) return r;
    const nr = nR - 1;
    insertRow(nr);
    return nr;
  }

  /* Place H segments from (r, c1) to (r, c2), respecting direction */
  function placeH(r, c1, c2, route) {
    const step = c1 <= c2 ? 1 : -1;
    for (let c = c1; step > 0 ? c <= c2 : c >= c2; c += step) {
      grid[r][c] |= H;
      route.push({ r, c });
    }
  }

  /* Place V segments from (r1, c) to (r2, c), respecting direction */
  function placeV(r1, r2, c, route) {
    const step = r1 <= r2 ? 1 : -1;
    for (let r = r1; step > 0 ? r <= r2 : r >= r2; r += step) {
      grid[r][c] |= V;
      route.push({ r, c });
    }
  }

  /* Step 3: Route each port on the grid.
   * Unified approach: every route is H → V → H (for LR src) or V → H → V (for NS src).
   * L-bends are a special case where the first or last segment is zero-length.
   * The vertical/horizontal mid-segment uses a collision-free column/row.
   *
   * Routing order: adjacent-side ports (L-bends) first, then opposite/same-side
   * (Z/U-bends). L-bends are more constrained so they get priority.
   */
  const portOrder = ports.map((_, i) => i);
  portOrder.sort((a, b) => {
    const pa = ports[a], pb = ports[b];
    const adjA = pa.src.dir !== pa.dst.dir && pa.src.dir !== opposite[pa.dst.dir] ? 0 : 1;
    const adjB = pb.src.dir !== pb.dst.dir && pb.src.dir !== opposite[pb.dst.dir] ? 0 : 1;
    return adjA - adjB;
  });
  for (const i of portOrder) {
    const p = ports[i];
    const sg = chG[i].src, dg = chG[i].dst;
    const route = [];

    /* Try HVH route: H(sg.r, sg.c→mc) → V(sg.r→dg.r, mc) → H(dg.r, mc→dg.c) */
    function tryHVH(sg, dg, route) {
      if (sg.r === dg.r && sg.c !== dg.c) {
        /* Same row: just horizontal (skip endpoints) */
        const clo = Math.min(sg.c, dg.c), chi = Math.max(sg.c, dg.c);
        for (let c = clo; c <= chi; c++)
          if (c !== sg.c && c !== dg.c && grid[sg.r][c] & H) return false;
        placeH(sg.r, sg.c, dg.c, route);
        return true;
      }
      /* Try preferred column: interior first (avoid blocking border cols) */
      let mc = -1;
      if (dg.c >= 1 && dg.c < nC - 1 && isHVHFree(sg, dg, dg.c)) mc = dg.c;
      if (mc < 0)
        for (let c = 1; c < nC - 1; c++)
          if (isHVHFree(sg, dg, c)) { mc = c; break; }
      if (mc < 0)
        for (let c = 0; c < nC; c++)
          if (isHVHFree(sg, dg, c)) { mc = c; break; }
      if (mc < 0) return false;
      placeH(sg.r, sg.c, mc, route);
      if (sg.r !== dg.r) placeV(sg.r, dg.r, mc, route);
      if (mc !== dg.c) placeH(dg.r, mc, dg.c, route);
      return true;
    }

    /* Try VHV route: V(sg.r→mr, sg.c) → H(mr, sg.c→dg.c) → V(mr→dg.r, dg.c) */
    function tryVHV(sg, dg, route) {
      if (sg.c === dg.c && sg.r !== dg.r) {
        /* Same column: just vertical (skip endpoints) */
        const rlo = Math.min(sg.r, dg.r), rhi = Math.max(sg.r, dg.r);
        for (let r = rlo; r <= rhi; r++)
          if (r !== sg.r && r !== dg.r && grid[r][sg.c] & V) return false;
        placeV(sg.r, dg.r, sg.c, route);
        return true;
      }
      /* Try preferred row: interior first (avoid blocking border rows) */
      let mr = -1;
      if (dg.r >= 1 && dg.r < nR - 1 && isVHVFree(sg, dg, dg.r)) mr = dg.r;
      if (mr < 0)
        for (let r = 1; r < nR - 1; r++)
          if (isVHVFree(sg, dg, r)) { mr = r; break; }
      if (mr < 0)
        for (let r = 0; r < nR; r++)
          if (isVHVFree(sg, dg, r)) { mr = r; break; }
      if (mr < 0) return false;
      placeV(sg.r, mr, sg.c, route);
      if (sg.c !== dg.c) placeH(mr, sg.c, dg.c, route);
      if (mr !== dg.r) placeV(mr, dg.r, dg.c, route);
      return true;
    }

    if (sg.r === dg.r && sg.c === dg.c) {
      /* Same cell: nothing to route */
    } else {
      /* Try primary orientation first, then fallback, then insert and retry */
      const first = isLR(p.src.dir) ? tryHVH : tryVHV;
      const second = isLR(p.src.dir) ? tryVHV : tryHVH;
      let ok = first(sg, dg, route) || second(sg, dg, route);
      while (!ok) {
        insertCol(nC - 1);
        insertRow(nR - 1);
        ok = first(sg, dg, route) || second(sg, dg, route);
      }
    }
    allRoutes.push(route);
  }

  /* Step 4: Convert grid coords to pixel coords */
  const cW = cellSize / nC, rH = cellSize / nR;
  const toXY = pt => ({ x: (pt.c + 0.5) * cW, y: (pt.r + 0.5) * rH });

  /* Deduplicate consecutive identical points in routes */
  const pixelRoutes = allRoutes.map(route => {
    const seen = new Set();
    const pts = [];
    for (const pt of route) {
      const k = pt.r + ',' + pt.c;
      if (!seen.has(k)) { seen.add(k); pts.push(toXY(pt)); }
    }
    return pts;
  });

  /* Step 5: Compute sub-terminal spines in pixel coords.
   * Terminal edge position = first channel's position projected to the block edge.
   * Spine = vertical/horizontal line covering all channels for that terminal.
   */
  const spines = [];
  for (const [k, arr] of Object.entries(termPorts)) {
    const dir = k[0];
    const channels = arr.map(({ pi, end }) => toXY(chG[pi][end]));

    if (isLR(dir)) {
      channels.sort((a, b) => a.y - b.y);
      const edgeX = dir === 'W' ? 0 : cellSize;
      const spineX = channels[0].x;
      /* Horizontal stub from edge to spine for first channel */
      spines.push([{ x: edgeX, y: channels[0].y }, { x: spineX, y: channels[0].y }]);
      /* Vertical spine covering all channels */
      if (channels.length > 1)
        spines.push([{ x: spineX, y: channels[0].y },
                     { x: spineX, y: channels[channels.length - 1].y }]);
    } else {
      channels.sort((a, b) => a.x - b.x);
      const edgeY = dir === 'N' ? 0 : cellSize;
      const spineY = channels[0].y;
      /* Vertical stub from edge to spine for first channel */
      spines.push([{ x: channels[0].x, y: edgeY }, { x: channels[0].x, y: spineY }]);
      /* Horizontal spine covering all channels */
      if (channels.length > 1)
        spines.push([{ x: channels[0].x, y: spineY },
                     { x: channels[channels.length - 1].x, y: spineY }]);
    }
  }

  /* Step 6: Compute junction points (black dots at sub-terminal branches).
   * Any terminal with 2+ ports gets junction dots: the sub-terminal spine
   * creates a branch where edge, spine, and route(s) meet.
   */
  const junctions = [];
  for (const [k, arr] of Object.entries(termPorts)) {
    if (arr.length < 2) continue;
    const dir = k[0];
    const channels = arr.map(({ pi, end }) => toXY(chG[pi][end]));
    /* Exclude the last channel (L-bend with only 2 connections).
     * For W/E: last = largest y (bottommost in sub-terminal).
     * For N/S: last = largest x (rightmost in sub-terminal). */
    if (isLR(dir)) {
      channels.sort((a, b) => a.y - b.y);
      const sx = channels[0].x;
      for (let j = 0; j < channels.length - 1; j++)
        junctions.push({ x: sx, y: channels[j].y });
    } else {
      channels.sort((a, b) => a.x - b.x);
      const sy = channels[0].y;
      for (let j = 0; j < channels.length - 1; j++)
        junctions.push({ x: channels[j].x, y: sy });
    }
  }

  return { routes: pixelRoutes, spines, junctions };
}

/* ---- Edge / Arrow drawing ---- */

function drawLine(ctx, x1, y1, x2, y2, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2, color, lw) {
  const hl = 12 * lw;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.15), y2 - hl * Math.sin(angle - 0.15));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.15), y2 - hl * Math.sin(angle + 0.15));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawCurvedLine(ctx, x1, y1, x2, y2, cpx, cpy, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpx, cpy, x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawCurvedArrowCP(ctx, x1, y1, x2, y2, cpx, cpy, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpx, cpy, x2, y2);
  ctx.stroke();
  const hl = 12 * lw;
  const tx = 2 * (x2 - cpx), ty = 2 * (y2 - cpy);
  const angle = Math.atan2(ty, tx);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.15), y2 - hl * Math.sin(angle - 0.15));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.15), y2 - hl * Math.sin(angle + 0.15));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* ---- Grid bounds ---- */

function computeBounds(path) {
  if (path.length > 0) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const s of path) {
      minX = Math.min(minX, s.x, s.x + (s.dir === 'E' ? 1 : 0));
      maxX = Math.max(maxX, s.x, s.x + (s.dir === 'E' ? 1 : 0));
      minY = Math.min(minY, s.y, s.y + (s.dir === 'N' ? 1 : 0));
      maxY = Math.max(maxY, s.y, s.y + (s.dir === 'N' ? 1 : 0));
    }
    return { minX, maxX, minY, maxY };
  }
  return { minX: 0, maxX: 3, minY: 0, maxY: 3 };
}

/* ---- Setup canvas with grid and axis labels ---- */

function setupCanvas(canvasId, wrapId, bounds) {
  const { minX, maxX, minY, maxY } = bounds;
  const cols = maxX - minX + 1;
  const rows = maxY - minY + 1;
  const canvas = document.getElementById(canvasId);
  const wrap = document.getElementById(wrapId);
  const idealW = BASE_MARGIN * 2 + cols * BASE_CELL;
  const availW = wrap.parentElement.clientWidth - 4;
  const scale = Math.min(1, availW / idealW);
  const CELL = BASE_CELL * scale;
  const MARGIN = BASE_MARGIN * scale;
  const S = scale;

  canvas.width = MARGIN * 2 + cols * CELL;
  canvas.height = MARGIN * 2 + rows * CELL;
  const ctx = canvas.getContext('2d');

  function bpos(bx, by) {
    return { x: MARGIN + (bx - minX) * CELL, y: MARGIN + (maxY - by) * CELL };
  }

  /* Clear */
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* Grid cells */
  for (let bx = minX; bx <= maxX; bx++) {
    for (let by = minY; by <= maxY; by++) {
      const bp = bpos(bx, by);
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 2 * S;
      ctx.strokeRect(bp.x, bp.y, CELL, CELL);
    }
  }

  /* Axis labels */
  ctx.fillStyle = '#888';
  ctx.font = `${22 * S}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  for (let bx = minX; bx <= maxX; bx++) {
    const bp = bpos(bx, minY);
    ctx.fillText(bx, bp.x + CELL / 2, bp.y - 4 * S + (maxY - minY + 1) * CELL + MARGIN * 0.6);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let by = minY; by <= maxY; by++) {
    const bp = bpos(minX, by);
    ctx.fillText(by, bp.x - 6 * S, bp.y + CELL / 2);
  }

  return { ctx, bpos, CELL, MARGIN, S };
}

/* ---- Draw normal view ---- */

function drawNormal(maze, path, nterm, bounds, directed) {
  const { ctx, bpos, CELL, MARGIN, S } = setupCanvas('canvas', 'canvas-wrap', bounds);
  const { minX, maxX, minY, maxY } = bounds;

  function statePos(s) {
    const bp = bpos(s.x, s.y);
    const tp = termLocalPos(s.dir, s.idx, nterm, CELL);
    return { x: bp.x + tp.x, y: bp.y + tp.y };
  }

  /* Draw a single port edge (diagonal: line or arrow) */
  function drawPortDiag(fx, fy, tx, ty, sameDir, dirChar) {
    if (sameDir) {
      const mx = (fx + tx) / 2, my = (fy + ty) / 2;
      const off = 30 * S;
      let cpx = mx, cpy = my;
      switch (dirChar) {
        case 'E': cpx = mx - off; break;
        case 'W': cpx = mx + off; break;
        case 'N': cpy = my + off; break;
        case 'S': cpy = my - off; break;
      }
      if (directed)
        drawCurvedArrowCP(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
      else
        drawCurvedLine(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
    } else {
      if (directed)
        drawArrow(ctx, fx, fy, tx, ty, '#000', 2 * S);
      else
        drawLine(ctx, fx, fy, tx, ty, '#000', 2 * S);
    }
  }

  /* Draw polyline through waypoints */
  function drawPolyline(pts, ox, oy) {
    if (pts.length < 2) return;
    ctx.save();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2 * S;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ox + pts[0].x, oy + pts[0].y);
    for (let i = 1; i < pts.length; i++)
      ctx.lineTo(ox + pts[i].x, oy + pts[i].y);
    ctx.stroke();
    ctx.restore();
  }

  /* Normal port edges inside each block */
  if (!directed) {
    /* Undirected: orthogonal routing with sub-block grid */
    /* Deduplicate ports (keep one per undirected edge) */
    const deduped = [];
    const seen = new Set();
    for (const port of maze.normal) {
      const k1 = port.src.dir + port.src.idx + ',' + port.dst.dir + port.dst.idx;
      const k2 = port.dst.dir + port.dst.idx + ',' + port.src.dir + port.src.idx;
      if (seen.has(k2)) continue;
      seen.add(k1);
      deduped.push(port);
    }
    const { routes, spines, junctions } = routeBlockPorts(deduped, nterm, CELL);
    for (let bx = minX; bx <= maxX; bx++) {
      for (let by = minY; by <= maxY; by++) {
        if (bx < 1 || by < 1) continue;
        const bp = bpos(bx, by);
        for (const route of routes)
          drawPolyline(route, bp.x, bp.y);
        for (const spine of spines)
          drawPolyline(spine, bp.x, bp.y);
        /* Junction dots (black circles at branch points) */
        for (const j of junctions) {
          ctx.beginPath();
          ctx.arc(bp.x + j.x, bp.y + j.y, 4 * S, 0, 2 * Math.PI);
          ctx.fillStyle = '#000';
          ctx.fill();
        }
      }
    }
  } else {
    /* Directed: diagonal arrows */
    for (let bx = minX; bx <= maxX; bx++) {
      for (let by = minY; by <= maxY; by++) {
        if (bx < 1 || by < 1) continue;
        const bp = bpos(bx, by);
        for (const port of maze.normal) {
          const from = termLocalPos(port.src.dir, port.src.idx, nterm, CELL);
          const to = termLocalPos(port.dst.dir, port.dst.idx, nterm, CELL);
          drawPortDiag(bp.x + from.x, bp.y + from.y, bp.x + to.x, bp.y + to.y,
                   port.src.dir === port.dst.dir, port.src.dir);
        }
      }
    }
  }

  /* nx port edges */
  for (let by = minY; by <= maxY; by++) {
    if (by < 1) continue;
    const bp = bpos(0, by);
    const drawn = new Set();
    for (const port of maze.nx) {
      if (!directed) {
        const k1 = port.src.idx + ',' + port.dst.idx;
        const k2 = port.dst.idx + ',' + port.src.idx;
        if (drawn.has(k2)) continue;
        drawn.add(k1);
      }
      const from = termLocalPos('E', port.src.idx, nterm, CELL);
      const to = termLocalPos('E', port.dst.idx, nterm, CELL);
      const fx = bp.x + from.x, fy = bp.y + from.y;
      const tx = bp.x + to.x, ty = bp.y + to.y;
      const mx = (fx + tx) / 2, my = (fy + ty) / 2;
      const cpx = mx - 30 * S, cpy = my;
      if (directed)
        drawCurvedArrowCP(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
      else
        drawCurvedLine(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
    }
  }

  /* ny port edges */
  for (let bx = minX; bx <= maxX; bx++) {
    if (bx < 1) continue;
    const bp = bpos(bx, 0);
    const drawn = new Set();
    for (const port of maze.ny) {
      if (!directed) {
        const k1 = port.src.idx + ',' + port.dst.idx;
        const k2 = port.dst.idx + ',' + port.src.idx;
        if (drawn.has(k2)) continue;
        drawn.add(k1);
      }
      const from = termLocalPos('N', port.src.idx, nterm, CELL);
      const to = termLocalPos('N', port.dst.idx, nterm, CELL);
      const fx = bp.x + from.x, fy = bp.y + from.y;
      const tx = bp.x + to.x, ty = bp.y + to.y;
      const mx = (fx + tx) / 2, my = (fy + ty) / 2;
      const cpx = mx, cpy = my + 30 * S;
      if (directed)
        drawCurvedArrowCP(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
      else
        drawCurvedLine(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
    }
  }

  /* Start and Goal markers */
  const startState = { x: 0, y: 1, dir: 'E', idx: 0 };
  const goalState  = { x: 0, y: 1, dir: 'E', idx: 1 };
  const startPos = statePos(startState);
  const goalPos  = statePos(goalState);
  for (const {pos, label, color} of [
    {pos: startPos, label: 'Start', color: '#27ae60'},
    {pos: goalPos,  label: 'Goal',  color: '#c0392b'}
  ]) {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 12 * S, 0, 2 * Math.PI);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.fillStyle = color;
    ctx.font = `bold ${20 * S}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, pos.x - 18 * S, pos.y);
  }

  /* Path line */
  if (path.length > 1) {
    ctx.save();
    ctx.strokeStyle = '#e63946';
    ctx.lineWidth = 6 * S;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    let p0 = statePos(path[0]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < path.length; i++) {
      const p = statePos(path[i]);
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.restore();

    /* Step number circles */
    for (let i = 0; i < path.length; i++) {
      const p = statePos(path[i]);
      const r = ((i >= 100) ? 26 : 20) * S;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, 2 * Math.PI);
      ctx.fillStyle = (i === 0) ? '#27ae60' : (i === path.length - 1) ? '#c0392b' : '#2980b9';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3 * S;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${(r > 20 * S ? 18 : 20) * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i.toString(), p.x, p.y);
    }
  }
}

/* ---- Draw simple (x,y only) view ---- */

function drawSimple(path, bounds) {
  const { minX, maxX, minY, maxY } = bounds;
  const cols = maxX - minX + 1;
  const rows = maxY - minY + 1;
  const CELL = 16;
  const PAD = 20;
  const canvas = document.getElementById('canvas-simple');
  canvas.width = PAD * 2 + cols * CELL;
  canvas.height = PAD * 2 + rows * CELL;
  const ctx = canvas.getContext('2d');

  function bpos(bx, by) {
    return { x: PAD + (bx - minX) * CELL, y: PAD + (maxY - by) * CELL };
  }

  /* Clear */
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* Grid */
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  for (let bx = minX; bx <= maxX; bx++) {
    for (let by = minY; by <= maxY; by++) {
      const bp = bpos(bx, by);
      ctx.strokeRect(bp.x, bp.y, CELL, CELL);
    }
  }

  /* Axis labels */
  ctx.fillStyle = '#999';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let bx = minX; bx <= maxX; bx++) {
    const bp = bpos(bx, minY);
    ctx.fillText(bx, bp.x + CELL / 2, bp.y + CELL + 2);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let by = minY; by <= maxY; by++) {
    const bp = bpos(minX, by);
    ctx.fillText(by, bp.x - 3, bp.y + CELL / 2);
  }

  /* Path lines: gradient B->R, 1px */
  if (path.length > 1) {
    ctx.lineWidth = 1;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    for (let i = 0; i < path.length - 1; i++) {
      const t = i / (path.length - 1);
      const r = Math.round(t * 255);
      const b = Math.round((1 - t) * 255);
      ctx.strokeStyle = `rgb(${r},0,${b})`;
      const p1 = bpos(path[i].x, path[i].y);
      const p2 = bpos(path[i + 1].x, path[i + 1].y);
      ctx.beginPath();
      ctx.moveTo(p1.x + CELL / 2, p1.y + CELL / 2);
      ctx.lineTo(p2.x + CELL / 2, p2.y + CELL / 2);
      ctx.stroke();
    }
    /* Start dot (blue) and end dot (red) */
    const sp = bpos(path[0].x, path[0].y);
    ctx.beginPath();
    ctx.arc(sp.x + CELL / 2, sp.y + CELL / 2, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#0000ff';
    ctx.fill();
    const ep = bpos(path[path.length - 1].x, path[path.length - 1].y);
    ctx.beginPath();
    ctx.arc(ep.x + CELL / 2, ep.y + CELL / 2, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#ff0000';
    ctx.fill();
  }
}

/* ---- Main draw ---- */

function draw() {
  const maze = parseMaze(document.getElementById('maze-input').value);
  const path = parsePath(document.getElementById('answer-input').value);
  const nterm = detectNterm(maze, path);
  const bounds = computeBounds(path);
  const showNormal = document.getElementById('chk-normal').checked;
  const showSimple = document.getElementById('chk-simple').checked;

  document.getElementById('normal-section').style.display = showNormal ? '' : 'none';
  document.getElementById('simple-section').style.display = showSimple ? '' : 'none';

  const directed = document.getElementById('chk-directed').checked;
  if (showNormal) drawNormal(maze, path, nterm, bounds, directed);
  if (showSimple) drawSimple(path, bounds);
}

/* Auto-split: if maze textarea contains "Path:", move that part to answer textarea */
function splitMazeInput() {
  const mazeEl = document.getElementById('maze-input');
  const answerEl = document.getElementById('answer-input');
  const lines = mazeEl.value.split('\n');
  let pathIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    if (/^Path:/i.test(t) && !/^Path\s+length:/i.test(t)) {
      pathIdx = i;
      break;
    }
  }
  if (pathIdx < 0) return;
  const mazeLines = lines.slice(0, pathIdx)
    .filter(l => !/^Path\s+length:/i.test(l.trim()));
  const pathFirst = lines[pathIdx].replace(/^Path:\s*/i, '').trim();
  const pathRest = lines.slice(pathIdx + 1).join('\n').trim();
  const pathPart = (pathFirst + (pathRest ? ' ' + pathRest : '')).trim();
  mazeEl.value = mazeLines.join('\n').trim();
  if (pathPart) answerEl.value = pathPart;
}

document.getElementById('maze-input').addEventListener('input', splitMazeInput);

function onResize() { draw(); }
function toggleVisibility() {
  document.getElementById('normal-section').style.display =
    document.getElementById('chk-normal').checked ? '' : 'none';
  document.getElementById('simple-section').style.display =
    document.getElementById('chk-simple').checked ? '' : 'none';
}

document.getElementById('draw-btn').addEventListener('click', draw);
document.getElementById('chk-normal').addEventListener('change', toggleVisibility);
document.getElementById('chk-simple').addEventListener('change', toggleVisibility);
document.getElementById('chk-directed').addEventListener('change', draw);
window.addEventListener('load', draw);
window.addEventListener('resize', onResize);
</script>
