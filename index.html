<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Repeated Maze Visualizer</title>
<style>
body { font-family: sans-serif; margin: 20px; background: #f5f5f5; }
h1 { font-size: 20px; margin: 0 0 12px; }
.fields { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; }
.field label { font-weight: bold; margin-bottom: 3px; font-size: 14px; }
textarea { font-family: monospace; font-size: 13px; padding: 6px; border: 1px solid #aaa; border-radius: 3px; }
#maze-input { width: 640px; height: 50px; }
#answer-input { width: 640px; height: 50px; }
button { padding: 7px 22px; font-size: 14px; cursor: pointer; background: #3498db; color: #fff; border: none; border-radius: 4px; }
button:hover { background: #2980b9; }
.legend { margin-top: 8px; font-size: 12px; color: #555; }
.legend span { margin-right: 14px; }
.legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }
.canvas-wrap { border: 1px solid #ccc; background: #fff; margin-top: 10px; max-width: 100%; }
canvas { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<h1>Repeated Maze Visualizer <span style="font-size:12px;color:#999">v2.4</span><!-- diagonal3: subgrid cell-based rendering --></h1>
<div class="fields">
  <div class="field">
    <label for="maze-input">Maze:</label>
    <textarea id="maze-input">normal: W0-N0, S0-W2, W2-S1, N1-W1; nx: (none); ny: (none)</textarea>
  </div>
  <div class="field">
    <label for="answer-input">Answer:</label>
    <textarea id="answer-input">(0,1,E0) -> (1,1,N0) -> (0,2,E2) -> (1,1,N1) -> (0,1,E1)</textarea>
  </div>
</div>
<div style="margin-bottom: 8px;">
  <label><input type="checkbox" id="chk-normal" checked> normal</label>
  <label style="margin-left: 12px;"><input type="checkbox" id="chk-simple"> x,y only</label>
  <label style="margin-left: 12px;"><input type="checkbox" id="chk-directed"> directed</label>
</div>
<button id="draw-btn">Draw Maze</button>
<div id="normal-section">
  <div class="legend">
    <span><span class="swatch" style="background:#e63946"></span>Path</span>
    <span><span class="swatch" style="background:#27ae60"></span>Start</span>
    <span><span class="swatch" style="background:#c0392b"></span>Goal</span>
  </div>
  <div id="canvas-wrap" class="canvas-wrap"><canvas id="canvas"></canvas></div>
</div>
<div id="simple-section" style="display:none;">
  <div class="legend">
    <span><span class="swatch" style="background:#0000ff"></span>Start</span>
    <span><span class="swatch" style="background:#ff0000"></span>End</span>
    <span>Color: Blue → Red</span>
  </div>
  <div id="canvas-wrap-simple" class="canvas-wrap"><canvas id="canvas-simple"></canvas></div>
</div>

<script>
/* Base sizes (at scale=1, these correspond to the "2x" design) */
const BASE_CELL = 240;
const BASE_MARGIN = 100;

/* ---- Parsing ---- */

function parseTermName(s) {
  s = s.trim();
  return { dir: s[0], idx: parseInt(s.substring(1)) };
}

function parseMaze(text) {
  /* Strip "Maze:" prefix and any "Path length: N" lines */
  text = text.replace(/^maze:\s*/i, '').trim();
  text = text.replace(/^path\s+length:\s*\d+.*$/gim, '').trim();
  const result = { normal: [], nx: [], ny: [] };
  const sections = text.split(';');
  for (const sec of sections) {
    const t = sec.trim();
    const ci = t.indexOf(':');
    if (ci < 0) continue;
    const type = t.substring(0, ci).trim().toLowerCase();
    const body = t.substring(ci + 1).trim();
    if (body === '(none)' || !body) continue;
    const ports = body.split(',').map(p => {
      const t = p.trim();
      const parts = t.includes('->') ? t.split('->') : t.split('-');
      if (parts.length !== 2) return null;
      return { src: parseTermName(parts[0]), dst: parseTermName(parts[1]) };
    }).filter(p => p !== null);
    if (type === 'normal') result.normal = ports;
    else if (type === 'nx') result.nx = ports;
    else if (type === 'ny') result.ny = ports;
  }
  return result;
}

function parsePath(text) {
  /* Strip "Path:" prefix and "Path length: N" lines */
  text = text.replace(/^path\s+length:\s*\d+.*$/gim, '').trim();
  text = text.replace(/^path:\s*/i, '').trim();
  if (!text) return [];
  const parts = text.split('->');
  return parts.map(p => {
    const m = p.trim().match(/\((-?\d+),(-?\d+),([A-Z])(\d+)\)/);
    if (!m) return null;
    return { x: parseInt(m[1]), y: parseInt(m[2]), dir: m[3], idx: parseInt(m[4]) };
  }).filter(s => s !== null);
}

function detectNterm(maze, path) {
  let nterm = 2;
  for (const ports of [maze.normal, maze.nx, maze.ny])
    for (const p of ports)
      nterm = Math.max(nterm, p.src.idx + 1, p.dst.idx + 1);
  for (const s of path)
    nterm = Math.max(nterm, s.idx + 1);
  return nterm;
}

/* ---- Geometry helpers ---- */

function termLocalPos(dir, idx, nterm, cellSize) {
  const t = cellSize * (idx + 1) / (nterm + 1);
  switch (dir) {
    case 'E': return { x: cellSize, y: t };
    case 'W': return { x: 0, y: t };
    case 'N': return { x: t, y: 0 };
    case 'S': return { x: t, y: cellSize };
  }
}

function termInsetPos(dir, idx, nterm) {
  const p = termLocalPos(dir, idx, nterm);
  switch (dir) {
    case 'E': return { x: p.x - INSET, y: p.y };
    case 'W': return { x: p.x + INSET, y: p.y };
    case 'N': return { x: p.x, y: p.y + INSET };
    case 'S': return { x: p.x, y: p.y - INSET };
  }
}

/* ---- Orthogonal port routing ---- */

/*
 * routeBlockPorts -- compute orthogonal polyline routes for all normal ports.
 *
 * Algorithm (from diagonal2.md): deterministic collision-free routing (v1.0).
 * 1. Count ports per side. Assign channel indices per terminal.
 * 2. Adjacent → L-bend (no middle channel). Opposite/Same → Z-bend (mH/mV).
 * 3. Pre-compute grid size: nR = 1+pW+pE+mH+1, nC = 1+pN+pS+mV+1.
 * 4. Route: L-bend at channel intersection, Z/U-bend via dedicated middle channel.
 * 5. No collision search or grid expansion needed — overlaps cannot occur.
 * 6. termPos display-only alignment: E[i].y = W[i].y, S[i].x = N[i].x.
 *
 * Returns array of polylines (each is [{x,y}] in block-local coordinates).
 */
function routeBlockPorts(ports, nterm, cellSize) {
  /* diagonal3: insertion-based routing.
   * Each port gets dedicated rows/cols → no same-direction collisions by construction.
   * Swap trials minimize crossings. */
  if (ports.length === 0) {
    const termPos = {};
    for (let i = 0; i < nterm; i++) {
      const t = cellSize * (i + 1) / (nterm + 1);
      termPos['W'+i] = {x:0, y:t}; termPos['E'+i] = {x:cellSize, y:t};
      termPos['N'+i] = {x:t, y:0}; termPos['S'+i] = {x:t, y:cellSize};
    }
    return { routes: [], spines: [], junctions: [], termPos, overlaps: [] };
  }

  const isLR = d => d === 'W' || d === 'E';
  const opposite = { E:'W', W:'E', N:'S', S:'N' };

  /* --- Build termPorts --- */
  const termPorts = {};
  for (let i = 0; i < ports.length; i++) {
    const p = ports[i];
    const sk = p.src.dir + p.src.idx, dk = p.dst.dir + p.dst.idx;
    (termPorts[sk] = termPorts[sk] || []).push({ pi: i, end: 'src' });
    (termPorts[dk] = termPorts[dk] || []).push({ pi: i, end: 'dst' });
  }

  /* --- Sub-terminal lists: ordered arrays of {pi, end, termIdx} ---
   * wList/eList: rows (H direction). nList/sList: cols (V direction).
   * Each entry = one sub-terminal channel for one port endpoint. */
  const wList = [], eList = [], nList = [], sList = [];
  /* mainRows: rows in area 5 (between W/E sub-terminals). Each row is owned by a port's H segment. */
  /* mainCols: cols in area 5 (between N/S sub-terminals). Each col is owned by a port's V segment. */
  const mainRows = []; /* not used for L-case */
  const mainCols = [];

  /* Route data: for each port, the grid-level route description */
  const routeData = []; /* {srcRow, dstRow, srcCol, dstCol, turnCol, turnRow, shape} */
  for (let i = 0; i < ports.length; i++) routeData.push(null);

  /* --- Classify and insert each port --- */
  function getShape(p) {
    if (p.src.dir === p.dst.dir) return 'U';
    if (p.src.dir === opposite[p.dst.dir]) return 'S';
    return 'L';
  }

  /* Insert into a sub-terminal list in terminal-index order.
   * Returns the insertion index. */
  function insertSubterm(list, termIdx, entry) {
    let pos = list.length;
    for (let i = 0; i < list.length; i++) {
      if (list[i].termIdx > termIdx) { pos = i; break; }
    }
    list.splice(pos, 0, { ...entry, termIdx });
    return pos;
  }

  /* Get the sub-terminal list for a direction */
  function getList(dir) {
    switch(dir) { case 'W': return wList; case 'E': return eList; case 'N': return nList; case 'S': return sList; }
  }

  /* Count crossings in the main area given current routing.
   * A crossing occurs when port A goes H through a cell where port B goes V. */
  function countCrossings() {
    let count = 0;
    /* For each pair of routed ports, check if their H and V segments cross */
    for (let a = 0; a < ports.length; a++) {
      const ra = routeData[a]; if (!ra) continue;
      for (let b = a + 1; b < ports.length; b++) {
        const rb = routeData[b]; if (!rb) continue;
        /* Port A's H segment is at its srcRow (for L/S/U, the H part).
         * Port B's V segment is at its column (for L, the dstCol; for S/U, the turnCol).
         * They cross if A's H row is between B's V row range and B's V col is between A's H col range. */
        if (hCrossesV(ra, rb)) count++;
        if (hCrossesV(rb, ra)) count++;
      }
    }
    return count;
  }

  function hCrossesV(ra, rb) {
    /* Does ra's H segment cross rb's V segment in the main area? */
    /* ra has H at some row. rb has V at some col. */
    /* For L-shape (W→N): H goes from col 0 to dstCol at srcRow. V goes from srcRow to row 0 at dstCol. */
    /* We need to check if ra's H row is within rb's V row range and rb's V col is within ra's H col range. */
    /* Simplified: just check if they share a cell in the main area. */
    /* This is complex for general cases. Use a grid-based approach instead. */
    return false; /* placeholder - will use grid-based counting */
  }

  /* --- Process each port --- */
  for (let pi = 0; pi < ports.length; pi++) {
    const p = ports[pi];
    const shape = getShape(p);
    const srcDir = p.src.dir, dstDir = p.dst.dir;
    const srcIdx = p.src.idx, dstIdx = p.dst.idx;
    const srcList = getList(srcDir), dstList = getList(dstDir);

    if (shape === 'L') {
      /* Source insertion */
      const srcPos = insertSubterm(srcList, srcIdx, { pi, end: 'src' });
      /* Destination insertion */
      const dstPos = insertSubterm(dstList, dstIdx, { pi, end: 'dst' });
      routeData[pi] = { shape: 'L', srcDir, dstDir, srcIdx, dstIdx, srcPos, dstPos };

    } else if (shape === 'S') {
      /* Source insertion */
      const srcPos = insertSubterm(srcList, srcIdx, { pi, end: 'src' });
      /* Destination insertion */
      const dstPos = insertSubterm(dstList, dstIdx, { pi, end: 'dst' });
      /* Orthogonal insertion: column (if src is LR) or row (if src is !LR) at midpoint */
      let turnPos;
      if (isLR(srcDir)) {
        turnPos = Math.floor(mainCols.length / 2);
        mainCols.splice(turnPos, 0, pi);
      } else {
        turnPos = Math.floor(mainRows.length / 2);
        mainRows.splice(turnPos, 0, pi);
      }
      routeData[pi] = { shape: 'S', srcDir, dstDir, srcIdx, dstIdx, srcPos, dstPos, turnPos };

    } else { /* U */
      const srcPos = insertSubterm(srcList, srcIdx, { pi, end: 'src' });
      const dstPos = insertSubterm(dstList, dstIdx, { pi, end: 'dst' });
      let turnPos;
      if (isLR(srcDir)) {
        turnPos = Math.floor(mainCols.length / 2);
        mainCols.splice(turnPos, 0, pi);
      } else {
        turnPos = Math.floor(mainRows.length / 2);
        mainRows.splice(turnPos, 0, pi);
      }
      routeData[pi] = { shape: 'U', srcDir, dstDir, srcIdx, dstIdx, srcPos, dstPos, turnPos };
    }
  }

  /* --- Build grid from sub-terminal lists and main area --- */
  /* Grid layout:
   * Rows: [N border=0] [N sub-terms: nList.length] [main rows: mainRows.length + max(wList.length, eList.length)] [S sub-terms: sList.length] [S border]
   * Wait, this isn't right. Let me reconsider.
   *
   * The grid rows are:
   *   row 0: N border
   *   rows 1..nList.length: N sub-terminal area (area 2) -- NOT rows, these are COLUMNS
   *
   * Actually: N and S sub-terminals add COLUMNS, W and E add ROWS.
   * N sub-terminal channels are at row 0 (border) going down. But in the spec, N sub-terminal is a col in area 2.
   *
   * Let me re-think the grid structure for diagonal3:
   *   Rows: 0=N-border, then W/E sub-terminal rows, then S-border
   *   Cols: 0=W-border, then N/S sub-terminal cols, then E-border
   *   Main area: the intersection of W/E rows and N/S cols
   *
   * W sub-terminal: each entry in wList adds a row. These rows go H from W border into main area.
   * E sub-terminal: each entry in eList adds a row. Same rows as W (interleaved by terminal idx).
   * N sub-terminal: each entry in nList adds a col. V from N border into main area.
   * S sub-terminal: each entry in sList adds a col. Same cols as N (interleaved by terminal idx).
   * Main area extra cols: mainCols (for S-bend and U-bend turn columns).
   * Main area extra rows: mainRows (for S-bend and U-bend turn rows, when !isLR).
   */

  /* Compute row positions:
   * We need to interleave W and E sub-terminals by terminal index.
   * wList and eList are sorted by termIdx. Merge them to get row order.
   * Actually, each entry in wList is a row. Each entry in eList is also a row.
   * For terminal alignment: W[i] and E[i] should share the same row range.
   * With diagonal3: each port endpoint gets its OWN row. W0-S0 gets a W row. W0-N0 gets another W row.
   * E0-W1 gets an E row. Etc.
   * W and E rows are at the same "level" in the grid (between N-border and S-border).
   * Their relative order comes from the sub-terminal list order.
   */

  /* Total row/col counts */
  /* For LR (W/E) direction: sub-terminal rows + main-area extra rows */
  const lrRows = wList.length + eList.length + mainRows.length;
  /* For TB (N/S) direction: sub-terminal cols + main-area extra cols */
  const tbCols = nList.length + sList.length + mainCols.length;

  const nR = 1 + lrRows + 1; /* N-border + rows + S-border */
  const nC = 1 + tbCols + 1; /* W-border + cols + E-border */

  /* Map each sub-terminal entry and main entry to a grid row/col.
   * The order within the grid:
   *   Rows: [N-border=0] [wList entries at rows 1..wList.length] [mainRows at ...] [eList at ...] [S-border]
   * Wait, this interleaving needs more thought.
   *
   * For the L-shape W→N: the H goes from W border rightward, turns V upward to N border.
   * W row should be BETWEEN N-border (top) and S-border (bottom).
   * N col should be BETWEEN W-border (left) and E-border (right).
   *
   * Grid row order (top to bottom):
   *   0: N border
   *   1..wLen: W sub-terminal rows (these go H from left border into area 5)
   *   wLen+1..wLen+mainRows.length: main extra rows (for !isLR S/U bends)
   *   wLen+mainRows.length+1..wLen+mainRows.length+eLen: E sub-terminal rows
   *   last: S border
   *
   * Grid col order (left to right):
   *   0: W border
   *   1..nLen: N sub-terminal cols (these go V from top border into area 5)
   *   nLen+1..nLen+mainCols.length: main extra cols (for isLR S/U bends)
   *   nLen+mainCols.length+1..nLen+mainCols.length+sLen: S sub-terminal cols
   *   last: E border
   */
  const wStart = 1;
  const mrStart = wStart + wList.length;
  const eStart = mrStart + mainRows.length;
  const nStart = 1;
  const mcStart = nStart + nList.length;
  const sStart = mcStart + mainCols.length;

  /* Map sub-terminal list index to grid row/col */
  function wRow(i) { return wStart + i; }
  function eRow(i) { return eStart + i; }
  function nCol(i) { return nStart + i; }
  function sCol(i) { return sStart + i; }
  function mainRowR(i) { return mrStart + i; }
  function mainColC(i) { return mcStart + i; }

  /* For each port, compute the grid-level route as a sequence of (row, col) cells */
  const allRoutes = [];
  const grid = Array.from({length: nR}, () => Array(nC).fill(0));
  const hOwner = Array.from({length: nR}, () => Array(nC).fill(-1));
  const vOwner = Array.from({length: nR}, () => Array(nC).fill(-1));
  const H = 1, V = 2;

  function placeH(r, c1, c2, pi, route) {
    const step = c1 <= c2 ? 1 : -1;
    for (let c = c1; step > 0 ? c <= c2 : c >= c2; c += step) {
      grid[r][c] |= H; hOwner[r][c] = pi; route.push({r, c});
    }
  }
  function placeV(r1, r2, c, pi, route) {
    const step = r1 <= r2 ? 1 : -1;
    for (let r = r1; step > 0 ? r <= r2 : r >= r2; r += step) {
      grid[r][c] |= V; vOwner[r][c] = pi; route.push({r, c});
    }
  }

  for (let pi = 0; pi < ports.length; pi++) {
    const rd = routeData[pi]; if (!rd) { allRoutes.push([]); continue; }
    const route = [];
    const p = ports[pi];

    /* Find grid positions for this port's endpoints */
    const srcList = getList(rd.srcDir), dstList = getList(rd.dstDir);
    const srcListIdx = srcList.findIndex(e => e.pi === pi && e.end === 'src');
    const dstListIdx = dstList.findIndex(e => e.pi === pi && e.end === 'dst');

    let srcR, srcC, dstR, dstC;

    /* Source position: on the border */
    if (rd.srcDir === 'W') { srcR = wRow(srcListIdx); srcC = 0; }
    else if (rd.srcDir === 'E') { srcR = eRow(srcListIdx); srcC = nC - 1; }
    else if (rd.srcDir === 'N') { srcR = 0; srcC = nCol(srcListIdx); }
    else { srcR = nR - 1; srcC = sCol(srcListIdx); }

    /* Destination position: on the border */
    if (rd.dstDir === 'W') { dstR = wRow(dstListIdx); dstC = 0; }
    else if (rd.dstDir === 'E') { dstR = eRow(dstListIdx); dstC = nC - 1; }
    else if (rd.dstDir === 'N') { dstR = 0; dstC = nCol(dstListIdx); }
    else { dstR = nR - 1; dstC = sCol(dstListIdx); }

    if (rd.shape === 'L') {
      /* L-shape: H from src to dst's col/row, then V to dst */
      if (isLR(rd.srcDir)) {
        /* H first (along src row), then V */
        placeH(srcR, srcC, dstC, pi, route);
        if (srcR !== dstR) placeV(srcR, dstR, dstC, pi, route);
      } else {
        /* V first (along src col), then H */
        placeV(srcR, dstR, srcC, pi, route);
        if (srcC !== dstC) placeH(dstR, srcC, dstC, pi, route);
      }
    } else if (rd.shape === 'S') {
      /* S-shape: H/V to turn point, then V/H to dst */
      if (isLR(rd.srcDir)) {
        const tc = mainColC(mainCols.indexOf(pi));
        placeH(srcR, srcC, tc, pi, route);
        placeV(srcR, dstR, tc, pi, route);
        placeH(dstR, tc, dstC, pi, route);
      } else {
        const tr = mainRowR(mainRows.indexOf(pi));
        placeV(srcR, tr, srcC, pi, route);
        placeH(tr, srcC, dstC, pi, route);
        placeV(tr, dstR, dstC, pi, route);
      }
    } else { /* U */
      if (isLR(rd.srcDir)) {
        const tc = mainColC(mainCols.indexOf(pi));
        placeH(srcR, srcC, tc, pi, route);
        placeV(srcR, dstR, tc, pi, route);
        placeH(dstR, tc, dstC, pi, route);
      } else {
        const tr = mainRowR(mainRows.indexOf(pi));
        placeV(srcR, tr, srcC, pi, route);
        placeH(tr, srcC, dstC, pi, route);
        placeV(tr, dstR, dstC, pi, route);
      }
    }

    allRoutes.push(route);
  }

  /* --- Convert to pixels --- */
  const cW = cellSize / nC, rH = cellSize / nR;
  const toXY = pt => ({ x: (pt.c + 0.5) * cW, y: (pt.r + 0.5) * rH });

  const pixelRoutes = allRoutes.map(route => {
    const seen = new Set(); const pts = [];
    for (const pt of route) {
      const k = pt.r + ',' + pt.c;
      if (!seen.has(k)) { seen.add(k); pts.push(toXY(pt)); }
    }
    return pts;
  });

  /* --- Spines --- */
  const spines = [];
  for (const [k, arr] of Object.entries(termPorts)) {
    const dir = k[0];
    const channels = arr.map(({pi, end}) => {
      const list = getList(dir);
      const idx = list.findIndex(e => e.pi === pi && e.end === end);
      if (dir === 'W') return toXY({r: wRow(idx), c: 0});
      if (dir === 'E') return toXY({r: eRow(idx), c: nC-1});
      if (dir === 'N') return toXY({r: 0, c: nCol(idx)});
      return toXY({r: nR-1, c: sCol(idx)});
    });

    if (isLR(dir)) {
      channels.sort((a,b) => a.y - b.y);
      const edgeX = dir === 'W' ? 0 : cellSize;
      const spX = channels[0].x;
      spines.push([{x:edgeX, y:channels[0].y}, {x:spX, y:channels[0].y}]);
      if (channels.length > 1)
        spines.push([{x:spX, y:channels[0].y}, {x:spX, y:channels[channels.length-1].y}]);
    } else {
      channels.sort((a,b) => a.x - b.x);
      const edgeY = dir === 'N' ? 0 : cellSize;
      const spY = channels[0].y;
      spines.push([{x:channels[0].x, y:edgeY}, {x:channels[0].x, y:spY}]);
      if (channels.length > 1)
        spines.push([{x:channels[0].x, y:spY}, {x:channels[channels.length-1].x, y:spY}]);
    }
  }
  /* Deduplicate */
  const spKey = s => [s[0].x,s[0].y,s[1].x,s[1].y].map(v=>v.toFixed(4)).join(',');
  const seenSp = new Set();
  const uSp = spines.filter(s => { const k=spKey(s); if(seenSp.has(k)) return false; seenSp.add(k); return true; });
  spines.length = 0; for (const s of uSp) spines.push(s);

  /* --- Junctions --- */
  const junctions = [];
  for (const [k, arr] of Object.entries(termPorts)) {
    if (arr.length < 2) continue;
    const dir = k[0];
    const channels = arr.map(({pi, end}) => {
      const list = getList(dir);
      const idx = list.findIndex(e => e.pi === pi && e.end === end);
      if (dir === 'W') return toXY({r: wRow(idx), c: 0});
      if (dir === 'E') return toXY({r: eRow(idx), c: nC-1});
      if (dir === 'N') return toXY({r: 0, c: nCol(idx)});
      return toXY({r: nR-1, c: sCol(idx)});
    });
    if (isLR(dir)) {
      channels.sort((a,b) => a.y - b.y);
      const sx = channels[0].x;
      for (let j = 0; j < channels.length - 1; j++) junctions.push({x:sx, y:channels[j].y});
    } else {
      channels.sort((a,b) => a.x - b.x);
      const sy = channels[0].y;
      for (let j = 0; j < channels.length - 1; j++) junctions.push({x:channels[j].x, y:sy});
    }
  }

  /* --- termPos --- */
  const termPos = {};
  for (const [k, arr] of Object.entries(termPorts)) {
    const dir = k[0];
    const channels = arr.map(({pi, end}) => {
      const list = getList(dir);
      const idx = list.findIndex(e => e.pi === pi && e.end === end);
      if (dir === 'W') return toXY({r: wRow(idx), c: 0});
      if (dir === 'E') return toXY({r: eRow(idx), c: nC-1});
      if (dir === 'N') return toXY({r: 0, c: nCol(idx)});
      return toXY({r: nR-1, c: sCol(idx)});
    });
    if (isLR(dir)) {
      channels.sort((a,b) => a.y - b.y);
      termPos[k] = { x: dir==='W' ? 0 : cellSize, y: channels[0].y };
    } else {
      channels.sort((a,b) => a.x - b.x);
      termPos[k] = { x: channels[0].x, y: dir==='N' ? 0 : cellSize };
    }
  }
  for (let i = 0; i < nterm; i++) {
    const t = cellSize * (i+1) / (nterm+1);
    if (!termPos['W'+i]) termPos['W'+i] = {x:0, y:t};
    if (!termPos['E'+i]) termPos['E'+i] = {x:cellSize, y:t};
    if (!termPos['N'+i]) termPos['N'+i] = {x:t, y:0};
    if (!termPos['S'+i]) termPos['S'+i] = {x:t, y:cellSize};
  }
  /* Alignment: participating side is authoritative */
  for (let i = 0; i < nterm; i++) {
    if (termPorts['W'+i]) termPos['E'+i] = {x:cellSize, y:termPos['W'+i].y};
    else if (termPorts['E'+i]) termPos['W'+i] = {x:0, y:termPos['E'+i].y};
    if (termPorts['N'+i]) termPos['S'+i] = {x:termPos['N'+i].x, y:cellSize};
    else if (termPorts['S'+i]) termPos['N'+i] = {x:termPos['S'+i].x, y:0};
  }

  /* --- Overlap detection --- */
  const endpoints = new Set();
  for (const rt of allRoutes) {
    if (rt.length > 0) {
      const f=rt[0], l=rt[rt.length-1];
      for (const p of [f,l]) { endpoints.add(p.r+','+p.c+',H'); endpoints.add(p.r+','+p.c+',V'); }
    }
  }
  const overlaps = [];
  for (let r = 0; r < nR; r++) for (let c = 0; c < nC; c++) {
    if (hOwner[r][c] === -2 && !endpoints.has(r+','+c+',H')) overlaps.push({r,c,dir:'H',px:toXY({r,c})});
    if (vOwner[r][c] === -2 && !endpoints.has(r+','+c+',V')) overlaps.push({r,c,dir:'V',px:toXY({r,c})});
  }

  /* --- Build subgrid: 2D array of sub-port shapes --- */
  /* Each cell contains one of: ' ','─','│','└','┘','┌','┐','┼' */
  const subgrid = Array.from({length: nR}, () => Array(nC).fill(' '));
  for (const rt of allRoutes) {
    const deduped = []; const seen2 = new Set();
    for (const pt of rt) { const k2=pt.r+','+pt.c; if(!seen2.has(k2)){seen2.add(k2);deduped.push(pt);} }
    for (let j = 0; j < deduped.length; j++) {
      const cur = deduped[j], prev = j > 0 ? deduped[j-1] : null, next = j < deduped.length-1 ? deduped[j+1] : null;
      let hasR=false,hasL=false,hasU=false,hasD=false;
      if (prev) { if(prev.c<cur.c)hasL=true; if(prev.c>cur.c)hasR=true; if(prev.r<cur.r)hasU=true; if(prev.r>cur.r)hasD=true; }
      if (next) { if(next.c>cur.c)hasR=true; if(next.c<cur.c)hasL=true; if(next.r>cur.r)hasD=true; if(next.r<cur.r)hasU=true; }
      const h = hasL||hasR, v = hasU||hasD;
      let shape = ' ';
      if (h && v) {
        /* Determine corner/cross from actual directions */
        const bits = (hasR?1:0)|(hasD?2:0)|(hasL?4:0)|(hasU?8:0);
        const map = {5:'─',10:'│',3:'┌',6:'┐',9:'└',12:'┘',15:'┼',1:'─',4:'─',2:'│',8:'│',
                     7:'┬',11:'├',13:'┴',14:'┤'};
        shape = map[bits] || '┼';
      } else if (h) { shape = '─'; }
      else if (v) { shape = '│'; }
      /* Merge with existing cell (for crossings from different ports) */
      const existing = subgrid[cur.r][cur.c];
      if (existing === ' ') { subgrid[cur.r][cur.c] = shape; }
      else if (existing === '─' && shape === '│') { subgrid[cur.r][cur.c] = '┼'; }
      else if (existing === '│' && shape === '─') { subgrid[cur.r][cur.c] = '┼'; }
      else { subgrid[cur.r][cur.c] = shape; } /* later port overwrites — should not happen with no-collision algo */
    }
  }
  /* Also mark spine cells */
  for (const sp of spines) {
    const isH = Math.abs(sp[0].y - sp[1].y) < 0.01;
    if (isH) {
      const rr = Math.round(sp[0].y / rH - 0.5);
      const c1 = Math.round(Math.min(sp[0].x, sp[1].x) / cW - 0.5);
      const c2 = Math.round(Math.max(sp[0].x, sp[1].x) / cW - 0.5);
      for (let c = c1; c <= c2 && c < nC; c++) {
        if (rr >= 0 && rr < nR) {
          const ex = subgrid[rr][c];
          if (ex === ' ') subgrid[rr][c] = '─';
          else if (ex === '│') subgrid[rr][c] = '┼';
        }
      }
    } else {
      const cc = Math.round(sp[0].x / cW - 0.5);
      const r1 = Math.round(Math.min(sp[0].y, sp[1].y) / rH - 0.5);
      const r2 = Math.round(Math.max(sp[0].y, sp[1].y) / rH - 0.5);
      for (let rr = r1; rr <= r2 && rr < nR; rr++) {
        if (cc >= 0 && cc < nC) {
          const ex = subgrid[rr][cc];
          if (ex === ' ') subgrid[rr][cc] = '│';
          else if (ex === '─') subgrid[rr][cc] = '┼';
        }
      }
    }
  }

  return { routes: pixelRoutes, spines, junctions, termPos, overlaps, subgrid, nR, nC };
}


/* ---- Edge / Arrow drawing ---- */

function drawLine(ctx, x1, y1, x2, y2, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2, color, lw) {
  const hl = 12 * lw;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.15), y2 - hl * Math.sin(angle - 0.15));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.15), y2 - hl * Math.sin(angle + 0.15));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawCurvedLine(ctx, x1, y1, x2, y2, cpx, cpy, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpx, cpy, x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawCurvedArrowCP(ctx, x1, y1, x2, y2, cpx, cpy, color, lw) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpx, cpy, x2, y2);
  ctx.stroke();
  const hl = 12 * lw;
  const tx = 2 * (x2 - cpx), ty = 2 * (y2 - cpy);
  const angle = Math.atan2(ty, tx);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.15), y2 - hl * Math.sin(angle - 0.15));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.15), y2 - hl * Math.sin(angle + 0.15));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

/* ---- Grid bounds ---- */

function computeBounds(path) {
  if (path.length > 0) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const s of path) {
      minX = Math.min(minX, s.x, s.x + (s.dir === 'E' ? 1 : 0));
      maxX = Math.max(maxX, s.x, s.x + (s.dir === 'E' ? 1 : 0));
      minY = Math.min(minY, s.y, s.y + (s.dir === 'N' ? 1 : 0));
      maxY = Math.max(maxY, s.y, s.y + (s.dir === 'N' ? 1 : 0));
    }
    return { minX, maxX, minY, maxY };
  }
  return { minX: 0, maxX: 3, minY: 0, maxY: 3 };
}

/* ---- Setup canvas with grid and axis labels ---- */

function setupCanvas(canvasId, wrapId, bounds) {
  const { minX, maxX, minY, maxY } = bounds;
  const cols = maxX - minX + 1;
  const rows = maxY - minY + 1;
  const canvas = document.getElementById(canvasId);
  const wrap = document.getElementById(wrapId);
  const idealW = BASE_MARGIN * 2 + cols * BASE_CELL;
  const availW = wrap.parentElement.clientWidth - 4;
  const scale = Math.min(1, availW / idealW);
  const CELL = BASE_CELL * scale;
  const MARGIN = BASE_MARGIN * scale;
  const S = scale;

  canvas.width = MARGIN * 2 + cols * CELL;
  canvas.height = MARGIN * 2 + rows * CELL;
  const ctx = canvas.getContext('2d');

  function bpos(bx, by) {
    return { x: MARGIN + (bx - minX) * CELL, y: MARGIN + (maxY - by) * CELL };
  }

  /* Clear */
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* Grid cells */
  for (let bx = minX; bx <= maxX; bx++) {
    for (let by = minY; by <= maxY; by++) {
      const bp = bpos(bx, by);
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 2 * S;
      ctx.strokeRect(bp.x, bp.y, CELL, CELL);
    }
  }

  /* Axis labels */
  ctx.fillStyle = '#888';
  ctx.font = `${22 * S}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  for (let bx = minX; bx <= maxX; bx++) {
    const bp = bpos(bx, minY);
    ctx.fillText(bx, bp.x + CELL / 2, bp.y - 4 * S + (maxY - minY + 1) * CELL + MARGIN * 0.6);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let by = minY; by <= maxY; by++) {
    const bp = bpos(minX, by);
    ctx.fillText(by, bp.x - 6 * S, bp.y + CELL / 2);
  }

  return { ctx, bpos, CELL, MARGIN, S };
}

/* ---- Draw normal view ---- */

function drawNormal(maze, path, nterm, bounds, directed) {
  const { ctx, bpos, CELL, MARGIN, S } = setupCanvas('canvas', 'canvas-wrap', bounds);
  const { minX, maxX, minY, maxY } = bounds;

  /* Compute grid-aligned terminal positions and routes for this maze */
  let gridTermPos = null;
  let gridResult = null;
  if (!directed) {
    const deduped0 = [];
    const seen0 = new Set();
    for (const port of maze.normal) {
      const k1 = port.src.dir + port.src.idx + ',' + port.dst.dir + port.dst.idx;
      const k2 = port.dst.dir + port.dst.idx + ',' + port.src.dir + port.src.idx;
      if (seen0.has(k2)) continue;
      seen0.add(k1);
      deduped0.push(port);
    }
    gridResult = routeBlockPorts(deduped0, nterm, CELL);
    gridTermPos = gridResult.termPos;
  }

  function statePos(s) {
    const bp = bpos(s.x, s.y);
    if (gridTermPos) {
      /* E[i]@(x,y) = W[i]@(x+1,y): use W[i]'s y at the right edge of block (x,y) */
      /* N[i]@(x,y) = S[i]@(x,y+1): use N[i]'s x at the bottom edge of block (x,y) ... wait, N is top */
      if (s.dir === 'E') {
        const wk = 'W' + s.idx;
        if (gridTermPos[wk])
          return { x: bp.x + CELL, y: bp.y + gridTermPos[wk].y };
      } else if (s.dir === 'N') {
        const sk = 'S' + s.idx;
        if (gridTermPos[sk])
          return { x: bp.x + gridTermPos[sk].x, y: bp.y };
      }
    }
    const tp = termLocalPos(s.dir, s.idx, nterm, CELL);
    return { x: bp.x + tp.x, y: bp.y + tp.y };
  }

  /* Draw a single port edge (diagonal: line or arrow) */
  function drawPortDiag(fx, fy, tx, ty, sameDir, dirChar) {
    if (sameDir) {
      const mx = (fx + tx) / 2, my = (fy + ty) / 2;
      const off = 30 * S;
      let cpx = mx, cpy = my;
      switch (dirChar) {
        case 'E': cpx = mx - off; break;
        case 'W': cpx = mx + off; break;
        case 'N': cpy = my + off; break;
        case 'S': cpy = my - off; break;
      }
      if (directed)
        drawCurvedArrowCP(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
      else
        drawCurvedLine(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
    } else {
      if (directed)
        drawArrow(ctx, fx, fy, tx, ty, '#000', 2 * S);
      else
        drawLine(ctx, fx, fy, tx, ty, '#000', 2 * S);
    }
  }

  /* Draw polyline through waypoints */
  function drawPolyline(pts, ox, oy) {
    if (pts.length < 2) return;
    ctx.save();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2 * S;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(ox + pts[0].x, oy + pts[0].y);
    for (let i = 1; i < pts.length; i++)
      ctx.lineTo(ox + pts[i].x, oy + pts[i].y);
    ctx.stroke();
    ctx.restore();
  }

  /* Normal port edges inside each block */
  if (!directed) {
    /* Undirected: orthogonal routing with sub-block grid */
    const { subgrid, nR: sgR, nC: sgC, junctions } = gridResult;
    const sgCW = CELL / sgC, sgRH = CELL / sgR;
    for (let bx = minX; bx <= maxX; bx++) {
      for (let by = minY; by <= maxY; by++) {
        if (bx < 1 || by < 1) continue;
        const bp = bpos(bx, by);
        /* Draw each sub-block cell */
        ctx.save();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2 * S;
        ctx.lineCap = 'round';
        for (let r = 0; r < sgR; r++) {
          for (let c = 0; c < sgC; c++) {
            const shape = subgrid[r][c];
            if (shape === ' ') continue;
            const cx = bp.x + (c + 0.5) * sgCW;
            const cy = bp.y + (r + 0.5) * sgRH;
            const hw = sgCW / 2, hh = sgRH / 2;
            ctx.beginPath();
            /* Draw lines from center to edges based on shape */
            if ('─┘┐┼┬┴┤'.includes(shape)) { ctx.moveTo(cx - hw, cy); ctx.lineTo(cx, cy); } /* left */
            if ('─└┌┼┬┴├'.includes(shape)) { ctx.moveTo(cx, cy); ctx.lineTo(cx + hw, cy); } /* right */
            if ('│└┘┼┴├┤'.includes(shape)) { ctx.moveTo(cx, cy - hh); ctx.lineTo(cx, cy); } /* up */
            if ('│┌┐┼┬├┤'.includes(shape)) { ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + hh); } /* down */
            ctx.stroke();
          }
        }
        ctx.restore();
        /* Junction dots */
        for (const j of junctions) {
          ctx.beginPath();
          ctx.arc(bp.x + j.x, bp.y + j.y, 4 * S, 0, 2 * Math.PI);
          ctx.fillStyle = '#000';
          ctx.fill();
        }
      }
    }
  } else {
    /* Directed: diagonal arrows */
    for (let bx = minX; bx <= maxX; bx++) {
      for (let by = minY; by <= maxY; by++) {
        if (bx < 1 || by < 1) continue;
        const bp = bpos(bx, by);
        for (const port of maze.normal) {
          const from = termLocalPos(port.src.dir, port.src.idx, nterm, CELL);
          const to = termLocalPos(port.dst.dir, port.dst.idx, nterm, CELL);
          drawPortDiag(bp.x + from.x, bp.y + from.y, bp.x + to.x, bp.y + to.y,
                   port.src.dir === port.dst.dir, port.src.dir);
        }
      }
    }
  }

  /* nx port edges — use grid positions in undirected mode */
  for (let by = minY; by <= maxY; by++) {
    if (by < 1) continue;
    const bp = bpos(0, by);
    const drawn = new Set();
    for (const port of maze.nx) {
      if (!directed) {
        const k1 = port.src.idx + ',' + port.dst.idx;
        const k2 = port.dst.idx + ',' + port.src.idx;
        if (drawn.has(k2)) continue;
        drawn.add(k1);
      }
      /* nx ports: E terminals at x=0 boundary. Use W channel y for grid alignment. */
      const fwk = 'W' + port.src.idx, twk = 'W' + port.dst.idx;
      const from = (!directed && gridTermPos && gridTermPos[fwk])
        ? { x: CELL, y: gridTermPos[fwk].y }
        : termLocalPos('E', port.src.idx, nterm, CELL);
      const to = (!directed && gridTermPos && gridTermPos[twk])
        ? { x: CELL, y: gridTermPos[twk].y }
        : termLocalPos('E', port.dst.idx, nterm, CELL);
      const fx = bp.x + from.x, fy = bp.y + from.y;
      const tx = bp.x + to.x, ty = bp.y + to.y;
      const mx = (fx + tx) / 2, my = (fy + ty) / 2;
      const cpx = mx - 30 * S, cpy = my;
      if (directed)
        drawCurvedArrowCP(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
      else
        drawCurvedLine(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
    }
  }

  /* ny port edges — use grid positions in undirected mode */
  for (let bx = minX; bx <= maxX; bx++) {
    if (bx < 1) continue;
    const bp = bpos(bx, 0);
    const drawn = new Set();
    for (const port of maze.ny) {
      if (!directed) {
        const k1 = port.src.idx + ',' + port.dst.idx;
        const k2 = port.dst.idx + ',' + port.src.idx;
        if (drawn.has(k2)) continue;
        drawn.add(k1);
      }
      /* ny ports: N terminals at y=0 boundary. N[i]@(bx,0) = S[i]@(bx,1),
       * so use S channel x for grid alignment with the adjacent normal block. */
      const fsk = 'S' + port.src.idx, tsk = 'S' + port.dst.idx;
      const from = (!directed && gridTermPos && gridTermPos[fsk])
        ? { x: gridTermPos[fsk].x, y: 0 }
        : termLocalPos('N', port.src.idx, nterm, CELL);
      const to = (!directed && gridTermPos && gridTermPos[tsk])
        ? { x: gridTermPos[tsk].x, y: 0 }
        : termLocalPos('N', port.dst.idx, nterm, CELL);
      const fx = bp.x + from.x, fy = bp.y + from.y;
      const tx = bp.x + to.x, ty = bp.y + to.y;
      const mx = (fx + tx) / 2, my = (fy + ty) / 2;
      const cpx = mx, cpy = my + 30 * S;
      if (directed)
        drawCurvedArrowCP(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
      else
        drawCurvedLine(ctx, fx, fy, tx, ty, cpx, cpy, '#000', 2 * S);
    }
  }

  /* Start and Goal markers */
  const startState = { x: 0, y: 1, dir: 'E', idx: 0 };
  const goalState  = { x: 0, y: 1, dir: 'E', idx: 1 };
  const startPos = statePos(startState);
  const goalPos  = statePos(goalState);
  for (const {pos, label, color} of [
    {pos: startPos, label: 'Start', color: '#27ae60'},
    {pos: goalPos,  label: 'Goal',  color: '#c0392b'}
  ]) {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 12 * S, 0, 2 * Math.PI);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.fillStyle = color;
    ctx.font = `bold ${20 * S}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, pos.x - 18 * S, pos.y);
  }

  /* Path line — use L-bends instead of diagonal lines */
  if (path.length > 1) {
    ctx.save();
    ctx.strokeStyle = '#e63946';
    ctx.lineWidth = 6 * S;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.beginPath();
    let p0 = statePos(path[0]);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < path.length; i++) {
      const prev = statePos(path[i - 1]);
      const p = statePos(path[i]);
      const dx = Math.abs(p.x - prev.x), dy = Math.abs(p.y - prev.y);
      if (dx > 0.5 && dy > 0.5) {
        /* Determine L-bend direction based on state types:
         * E-type state is on a vertical edge (left/right) → approach horizontally
         * N-type state is on a horizontal edge (top/bottom) → approach vertically
         * For the arriving state (path[i]), use its type to decide last segment. */
        if (path[i].dir === 'N') {
          /* Arriving at top/bottom edge: last segment is vertical → horizontal first */
          ctx.lineTo(p.x, prev.y);
        } else {
          /* Arriving at left/right edge: last segment is horizontal → vertical first */
          ctx.lineTo(prev.x, p.y);
        }
      }
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.restore();

    /* Step number circles */
    for (let i = 0; i < path.length; i++) {
      const p = statePos(path[i]);
      const r = ((i >= 100) ? 26 : 20) * S;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, 2 * Math.PI);
      ctx.fillStyle = (i === 0) ? '#27ae60' : (i === path.length - 1) ? '#c0392b' : '#2980b9';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3 * S;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${(r > 20 * S ? 18 : 20) * S}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i.toString(), p.x, p.y);
    }
  }

  /* ---- Verification framework ---- */
  if (!directed && gridTermPos) {
    const errors = [];
    const EPS = 0.5;

    /* V1: nx ports — curve endpoints must match W channel y */
    for (const port of maze.nx) {
      const wSrc = gridTermPos['W' + port.src.idx];
      const wDst = gridTermPos['W' + port.dst.idx];
      if (!wSrc) errors.push('nx: W' + port.src.idx + ' missing from gridTermPos');
      if (!wDst) errors.push('nx: W' + port.dst.idx + ' missing from gridTermPos');
    }

    /* V2: ny ports — curve endpoints must match S channel x */
    for (const port of maze.ny) {
      const sSrc = gridTermPos['S' + port.src.idx];
      const sDst = gridTermPos['S' + port.dst.idx];
      if (!sSrc) errors.push('ny: S' + port.src.idx + ' missing from gridTermPos');
      if (!sDst) errors.push('ny: S' + port.dst.idx + ' missing from gridTermPos');
    }

    /* V3: nx curve y must match adjacent normal block's W spine y */
    /* The nx curve is drawn at bp(0,by) + {x:CELL, y:termPos['W'+idx].y}
     * The normal block spine at bp(1,by) has W[idx] at {x:0, y:termPos['W'+idx].y}
     * These share the same CELL boundary, so y must match: both use termPos['W'+idx].y ✓
     * But verify the spine actually contains that y */
    if (gridResult) {
      for (const port of maze.nx) {
        for (const idx of [port.src.idx, port.dst.idx]) {
          const wPos = gridTermPos['W' + idx];
          /* Check: does any spine segment cover this y at x=0? */
          let found = false;
          for (const sp of gridResult.spines) {
            if (sp.length >= 2 && Math.abs(sp[0].x) < EPS) {
              const ys = sp.map(p => p.y);
              const minY = Math.min(...ys), maxY = Math.max(...ys);
              if (wPos.y >= minY - EPS && wPos.y <= maxY + EPS) found = true;
            }
            if (sp.length >= 2 && Math.abs(sp[0].y - wPos.y) < EPS && Math.abs(sp[1].y - wPos.y) < EPS) {
              if (Math.min(sp[0].x, sp[1].x) < EPS) found = true;
            }
          }
          if (!found) errors.push('nx: W' + idx + ' y=' + wPos.y.toFixed(1) + ' not connected to any spine at x=0');
        }
      }
    }

    /* V4: ny curve x must match adjacent normal block's S spine x */
    if (gridResult) {
      for (const port of maze.ny) {
        for (const idx of [port.src.idx, port.dst.idx]) {
          const sPos = gridTermPos['S' + idx];
          let found = false;
          for (const sp of gridResult.spines) {
            if (sp.length >= 2 && Math.abs(sp[0].y - CELL) < EPS) {
              const xs = sp.map(p => p.x);
              const minX = Math.min(...xs), maxX = Math.max(...xs);
              if (sPos.x >= minX - EPS && sPos.x <= maxX + EPS) found = true;
            }
            if (sp.length >= 2 && Math.abs(sp[0].x - sPos.x) < EPS && Math.abs(sp[1].x - sPos.x) < EPS) {
              if (Math.max(sp[0].y, sp[1].y) > CELL - EPS) found = true;
            }
          }
          if (!found) errors.push('ny: S' + idx + ' x=' + sPos.x.toFixed(1) + ' not connected to any spine at y=CELL');
        }
      }
    }

    /* V5: Answer path — no diagonal lines between consecutive states */
    if (path.length > 1) {
      for (let i = 0; i < path.length - 1; i++) {
        const a = statePos(path[i]), b = statePos(path[i + 1]);
        const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
        if (dx > EPS && dy > EPS) {
          errors.push('path[' + i + ']->[' + (i+1) + ']: diagonal (' +
            a.x.toFixed(1) + ',' + a.y.toFixed(1) + ')->(' +
            b.x.toFixed(1) + ',' + b.y.toFixed(1) + ') dx=' + dx.toFixed(1) + ' dy=' + dy.toFixed(1));
        }
      }
    }

    /* V6: Start/Goal y must match W0/W1 */
    const w0y = gridTermPos['W0'] ? gridTermPos['W0'].y : null;
    const w1y = gridTermPos['W1'] ? gridTermPos['W1'].y : null;
    if (w0y !== null && Math.abs(startPos.y - (bpos(0,1).y + w0y)) > EPS)
      errors.push('Start y=' + startPos.y.toFixed(1) + ' != W0 y=' + (bpos(0,1).y + w0y).toFixed(1));
    if (w1y !== null && Math.abs(goalPos.y - (bpos(0,1).y + w1y)) > EPS)
      errors.push('Goal y=' + goalPos.y.toFixed(1) + ' != W1 y=' + (bpos(0,1).y + w1y).toFixed(1));

    /* V7: gridTermPos completeness */
    for (let i = 0; i < nterm; i++) {
      for (const d of ['W', 'E', 'N', 'S'])
        if (!gridTermPos[d + i]) errors.push('gridTermPos missing ' + d + i);
    }

    /* V8: Sub-port overlap detection */
    if (gridResult && gridResult.overlaps) {
      for (const ov of gridResult.overlaps) {
        errors.push('OVERLAP: ' + ov.dir + ' at grid(' + ov.r + ',' + ov.c +
          ') px(' + ov.px.x.toFixed(1) + ',' + ov.px.y.toFixed(1) + ')');
      }
    }

    /* Output */
    if (errors.length === 0) {
      console.log('%c[Viewer Verify] ALL PASS', 'color:green;font-weight:bold');
    } else {
      console.log('%c[Viewer Verify] ' + errors.length + ' ERRORS:', 'color:red;font-weight:bold');
      for (const e of errors) console.log('  ' + e);
    }
  }
}

/* ---- Draw simple (x,y only) view ---- */

function drawSimple(path, bounds) {
  const { minX, maxX, minY, maxY } = bounds;
  const cols = maxX - minX + 1;
  const rows = maxY - minY + 1;
  const CELL = 16;
  const PAD = 20;
  const canvas = document.getElementById('canvas-simple');
  canvas.width = PAD * 2 + cols * CELL;
  canvas.height = PAD * 2 + rows * CELL;
  const ctx = canvas.getContext('2d');

  function bpos(bx, by) {
    return { x: PAD + (bx - minX) * CELL, y: PAD + (maxY - by) * CELL };
  }

  /* Clear */
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* Grid */
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  for (let bx = minX; bx <= maxX; bx++) {
    for (let by = minY; by <= maxY; by++) {
      const bp = bpos(bx, by);
      ctx.strokeRect(bp.x, bp.y, CELL, CELL);
    }
  }

  /* Axis labels */
  ctx.fillStyle = '#999';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let bx = minX; bx <= maxX; bx++) {
    const bp = bpos(bx, minY);
    ctx.fillText(bx, bp.x + CELL / 2, bp.y + CELL + 2);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let by = minY; by <= maxY; by++) {
    const bp = bpos(minX, by);
    ctx.fillText(by, bp.x - 3, bp.y + CELL / 2);
  }

  /* Path lines: gradient B->R, 1px */
  if (path.length > 1) {
    ctx.lineWidth = 1;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    for (let i = 0; i < path.length - 1; i++) {
      const t = i / (path.length - 1);
      const r = Math.round(t * 255);
      const b = Math.round((1 - t) * 255);
      ctx.strokeStyle = `rgb(${r},0,${b})`;
      const p1 = bpos(path[i].x, path[i].y);
      const p2 = bpos(path[i + 1].x, path[i + 1].y);
      ctx.beginPath();
      ctx.moveTo(p1.x + CELL / 2, p1.y + CELL / 2);
      ctx.lineTo(p2.x + CELL / 2, p2.y + CELL / 2);
      ctx.stroke();
    }
    /* Start dot (blue) and end dot (red) */
    const sp = bpos(path[0].x, path[0].y);
    ctx.beginPath();
    ctx.arc(sp.x + CELL / 2, sp.y + CELL / 2, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#0000ff';
    ctx.fill();
    const ep = bpos(path[path.length - 1].x, path[path.length - 1].y);
    ctx.beginPath();
    ctx.arc(ep.x + CELL / 2, ep.y + CELL / 2, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#ff0000';
    ctx.fill();
  }
}

/* ---- Main draw ---- */

function draw() {
  const maze = parseMaze(document.getElementById('maze-input').value);
  const path = parsePath(document.getElementById('answer-input').value);
  const nterm = detectNterm(maze, path);
  const bounds = computeBounds(path);
  const showNormal = document.getElementById('chk-normal').checked;
  const showSimple = document.getElementById('chk-simple').checked;

  document.getElementById('normal-section').style.display = showNormal ? '' : 'none';
  document.getElementById('simple-section').style.display = showSimple ? '' : 'none';

  const directed = document.getElementById('chk-directed').checked;
  if (showNormal) drawNormal(maze, path, nterm, bounds, directed);
  if (showSimple) drawSimple(path, bounds);
}

/* Auto-split: if maze textarea contains "Path:", move that part to answer textarea */
function splitMazeInput() {
  const mazeEl = document.getElementById('maze-input');
  const answerEl = document.getElementById('answer-input');
  const lines = mazeEl.value.split('\n');
  let pathIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    if (/^Path:/i.test(t) && !/^Path\s+length:/i.test(t)) {
      pathIdx = i;
      break;
    }
  }
  if (pathIdx < 0) return;
  const mazeLines = lines.slice(0, pathIdx)
    .filter(l => !/^Path\s+length:/i.test(l.trim()));
  const pathFirst = lines[pathIdx].replace(/^Path:\s*/i, '').trim();
  const pathRest = lines.slice(pathIdx + 1).join('\n').trim();
  const pathPart = (pathFirst + (pathRest ? ' ' + pathRest : '')).trim();
  mazeEl.value = mazeLines.join('\n').trim();
  if (pathPart) answerEl.value = pathPart;
}

document.getElementById('maze-input').addEventListener('input', splitMazeInput);

function onResize() { draw(); }
function toggleVisibility() {
  document.getElementById('normal-section').style.display =
    document.getElementById('chk-normal').checked ? '' : 'none';
  document.getElementById('simple-section').style.display =
    document.getElementById('chk-simple').checked ? '' : 'none';
}

document.getElementById('draw-btn').addEventListener('click', draw);
document.getElementById('chk-normal').addEventListener('change', toggleVisibility);
document.getElementById('chk-simple').addEventListener('change', toggleVisibility);
document.getElementById('chk-directed').addEventListener('change', draw);
window.addEventListener('load', draw);
window.addEventListener('resize', onResize);
</script>
